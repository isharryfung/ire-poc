# IRE Application Configuration - H2 Profile
# H2 In-Memory Database with Oracle Compatibility Mode
# For local development without external database setup

spring.application.name=ire

# ==================== H2 Database Configuration ====================
spring.datasource.url=jdbc:h2:mem:ire_db;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== JPA / Hibernate Configuration ====================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==================== Flyway Database Migration ====================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ==================== H2 Console Configuration ====================
# Access at: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# ==================== JSP View Resolver ====================
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ==================== Redis Configuration ====================
# Graceful degradation if Redis not available locally
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# ==================== Spring Security ====================
spring.security.user.name=${IRE_SECURITY_ADMIN_NAME:admin}
spring.security.user.password=${IRE_SECURITY_ADMIN_PASSWORD:admin123}

# ==================== IRE Security Credentials ====================
ire.security.api-user.name=${IRE_SECURITY_API_USER_NAME:api-user}
ire.security.api-user.password=${IRE_SECURITY_API_USER_PASSWORD:api-pass}
ire.security.admin.name=${IRE_SECURITY_ADMIN_NAME:admin}
ire.security.admin.password=${IRE_SECURITY_ADMIN_PASSWORD:admin123}
ire.security.reviewer.name=${IRE_SECURITY_REVIEWER_NAME:reviewer}
ire.security.reviewer.password=${IRE_SECURITY_REVIEWER_PASSWORD:reviewer-pass}

# ==================== Actuator ====================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# ==================== Quartz Scheduler ====================
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.scheduler.instanceName=IreScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# ==================== IRE Matching Engine ====================
ire.matching.tier2.candidate-limit=500

# ==================== Logging Configuration ====================
logging.level.root=INFO
logging.level.org.hkust.ire=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ==================== Development Settings ====================
# Skip Spring Security login for faster development
ire.security.disable-auth=true
