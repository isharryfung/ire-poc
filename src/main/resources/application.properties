# IRE Application Configuration - Default Profile
spring.application.name=ire

# JSP View Resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# H2 In-Memory Database (default profile - no Oracle needed for dev)
spring.datasource.url=jdbc:h2:mem:iredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Redis (graceful degradation if not available in dev)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# Spring Security - override with env vars in production
# Required env vars: IRE_SECURITY_ADMIN_PASSWORD, IRE_SECURITY_API_USER_PASSWORD, IRE_SECURITY_REVIEWER_PASSWORD
spring.security.user.name=${IRE_SECURITY_ADMIN_NAME:admin}
spring.security.user.password=${IRE_SECURITY_ADMIN_PASSWORD:}

# IRE user credentials - MUST be provided via environment variables in production
ire.security.api-user.name=${IRE_SECURITY_API_USER_NAME:api-user}
ire.security.api-user.password=${IRE_SECURITY_API_USER_PASSWORD:}
ire.security.admin.name=${IRE_SECURITY_ADMIN_NAME:admin}
ire.security.admin.password=${IRE_SECURITY_ADMIN_PASSWORD:}
ire.security.reviewer.name=${IRE_SECURITY_REVIEWER_NAME:reviewer}
ire.security.reviewer.password=${IRE_SECURITY_REVIEWER_PASSWORD:}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized

# Quartz
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.scheduler.instanceName=IreScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# Matching Engine
ire.matching.tier2.candidate-limit=500

# Logging
logging.level.org.hkust.ire=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n


# Local/dev only: skip Spring Security login for faster development
ire.security.disable-auth=true
