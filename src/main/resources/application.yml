spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ire;MODE=Oracle;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
app:
  iam:
    jwt-secret: ${IAM_JWT_SECRET:ire-dev-secret-ire-dev-secret}
  encryption:
    password: ${ENCRYPTION_PASSWORD:dev-password}
