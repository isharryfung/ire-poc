# IRE Application Configuration - Test Profile
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Disable Redis for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Disable Quartz for tests
spring.quartz.auto-startup=false

# IRE user credentials for tests
ire.security.api-user.name=api-user
ire.security.api-user.password=test-api-pass
ire.security.admin.name=admin
ire.security.admin.password=test-admin-pass
ire.security.reviewer.name=reviewer
ire.security.reviewer.password=test-reviewer-pass

logging.level.org.hkust.ire=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
