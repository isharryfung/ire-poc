# IRE Application Configuration - Production Profile
# All values MUST be set via environment variables in production

# Oracle DB - set via environment variables
spring.datasource.url=${ORACLE_DATASOURCE_URL}
spring.datasource.username=${ORACLE_DB_USER}
spring.datasource.password=${ORACLE_DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate - Oracle
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway - Oracle
spring.flyway.locations=classpath:db/migration/oracle
spring.flyway.baseline-on-migrate=false

# Redis
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}

logging.level.org.hkust.ire=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=ERROR
