# IRE Application Configuration - Dev Profile
# H2 is used for dev. For Oracle, set ORACLE_URL, ORACLE_USER, ORACLE_PASSWORD env vars.
spring.datasource.url=jdbc:h2:mem:iredev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hkust.ire=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
